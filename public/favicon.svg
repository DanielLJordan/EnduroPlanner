<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Stopwatch outer ring -->
  <circle cx="16" cy="19" r="10" fill="none" stroke="#f97316" stroke-width="2"/>
  <!-- Stopwatch face -->
  <circle cx="16" cy="19" r="7.5" fill="#1e293b"/>
  <!-- Crown / button -->
  <rect x="14.5" y="7" width="3" height="2.5" rx="1" fill="#f97316"/>
  <!-- Lug on crown -->
  <rect x="18.5" y="7.5" width="2" height="1.5" rx="0.75" fill="#f97316"/>
  <!-- Minute hand (pointing up-left = fast lap energy) -->
  <line x1="16" y1="19" x2="12.5" y2="14.5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Second hand (pointing right) -->
  <line x1="16" y1="19" x2="21" y2="19" stroke="#f97316" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="19" r="1" fill="#f97316"/>
</svg>
